<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GPT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/lib/highlight.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <main class="main-content">
      <header class="chat-header">
        <h1>GPT</h1>
        <div class="restart-container">
          <button onclick="restartConversation()" class="restart-btn" aria-label="New Chat">
            <img src="/static/new chat.svg" alt="New Chat" class="icon" />
          </button>
          <span class="action-label">New Chat</span>
        </div>
      </header>

      <div id="chat-box" class="chat-box"></div>

      <div class="input-wrapper">
        <form onsubmit="sendMessage(); return false;" class="chat-form">
          <textarea class="text-input-user" id="user-input" placeholder="Type your message here..."></textarea>
          <div class="chat-controls">
            <!-- <select id="delay-selector">
              <option value="0.5">0.5s</option>
              <option value="1">1s</option>
              <option value="2" selected>2s</option>
              <option value="3">3s</option>
              <option value="5">5s</option>
            </select> -->
            <button type="submit" class="send-btn">➤</button>
          </div>
        </form>

        <div class="prompt-buttons">
          <!-- Optional: Predefined prompt buttons go here -->
        </div>
      </div>
    </main>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
